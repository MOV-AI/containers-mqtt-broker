# MOV.AI edge broker defaults.
# Keep anonymous access for local/dev parity with current HiveMQ setup.
# Harden in production with password_file, acl_file, and TLS listeners.

persistence true
persistence_location /opt/hivemq/data

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

allow_anonymous true

# Standard MQTT/TCP listener inside container
listener 1883
protocol mqtt

# MQTT over WebSocket listener for edge web clients
listener 9001
protocol websockets

# Conservative resource limits for edge profile
max_inflight_messages 100
max_queued_messages 1000
message_size_limit 1048576
